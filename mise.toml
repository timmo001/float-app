min_version = "2025.1.0"

[tools]
node = "26.5.0"
bun = "1.3.14"

[tasks.install]
description = "Install float-app dependencies"
run = "bun install"

[tasks.dev]
description = "Run float-app in watch mode"
depends = ["install"]
run = "bun run dev"

[tasks.build]
description = "Compile the float-app binary"
depends = ["install"]
run = "bun run build"

[tasks.typecheck]
description = "Type-check float-app"
depends = ["install"]
run = "bunx tsc --noEmit"

[tasks.test]
description = "Run float-app tests"
depends = ["install"]
run = "bun test"

[tasks.format]
description = "Format source and tests"
depends = ["install"]
run = "bun run format"

[tasks."format:check"]
description = "Check formatting"
depends = ["install"]
run = "bun run format:check"

[tasks.completions]
description = "Generate shell completions"
depends = ["install"]
run = "bun run completions"

[tasks."docs:install"]
description = "Install documentation dependencies"
run = "bun install --cwd docs"

[tasks."docs:gen:cli"]
description = "Generate the CLI reference"
depends = ["docs:install"]
run = "bun run --cwd docs gen:cli"

[tasks."docs:build"]
description = "Build the documentation site"
depends = ["docs:install"]
run = "bun run --cwd docs build"

[tasks."completions:check"]
description = "Check generated shell completions"
depends = ["install"]
run = "bun run completions:check"

[tasks.check]
description = "Type-check, test, and verify formatting"
depends = ["typecheck", "test", "format:check", "completions:check"]
