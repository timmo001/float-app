---
name: Publish AUR git package

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
    paths:
      - src/**
      - package.json
      - bun.lock
      - mise.toml
      - LICENSE
      - .scripts/**
      - .github/workflows/release.yml
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare AUR package (float-app-git)
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Prepare float-app-git
        run: >-
          .scripts/linux/prepare-aur-git.sh
          "${{ runner.temp }}/float-app-git"
      - name: Upload float-app-git
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: >-
            aur-float-app-git-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/float-app-git
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish AUR (float-app-git)
    needs: prepare
    uses: >-
      timmo001/workflows/.github/workflows/publish-aur.yml@7c0c9b99547a5d90bb16f35ac848695c4b6473ab
    with:
      package-name: float-app-git
      artifact-name: >-
        aur-float-app-git-${{ github.run_id }}-${{ github.run_attempt }}
    secrets:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
